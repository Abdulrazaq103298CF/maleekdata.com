<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maleeki's Data - Reset Password</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: url("{{ url_for('static', filename='b.jpg') }}") no-repeat center center; background-size: cover; background-attachment: fixed; }
        .form-container { width: 420px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.18); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; padding: 45px 40px; color: #ffffff; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35); }
        h1 { font-size: 30px; text-align: center; margin-bottom: 25px; font-weight: 600; letter-spacing: 0.5px; }
        .input-box { position: relative; width: 100%; height: 52px; margin: 22px 0; }
        .input-box input { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; font-size: 15px; color: #ffffff; padding: 0 50px 0 20px; outline: none; transition: all 0.25s ease; }
        .input-box input:focus { border-color: rgba(255, 255, 255, 0.7); background: rgba(255, 255, 255, 0.12); }
        .input-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 20px; color: rgba(255, 255, 255, 0.5); }
        .btn { width: 100%; height: 50px; background: #ffffff; border: none; outline: none; border-radius: 12px; cursor: pointer; font-size: 16px; color: #1a1a1a; font-weight: 600; transition: all 0.25s ease; margin-top: 10px; }
        .btn:hover { background: #f8f9fa; box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        .back-link { font-size: 14px; text-align: center; margin-top: 25px; }
        .back-link a { color: #ffffff; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; text-align: center; font-weight: 500; }
        .alert.error { background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.4); color: #ff7675; }
    </style>
</head>
<body>
    <div class="form-container">
        <form action="/forgot_password" method="post">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <h1>Reset Password</h1>
            <div class="input-box">
                <input type="text" name="Username" placeholder="Confirm Username" required>
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input type="password" name="new_password" placeholder="New Password" required>
                <i class="bx bxs-lock-alt"></i>
            </div>
            <button type="submit" class="btn">Update Password</button>
            <div class="back-link">
                <p><a href="{{ url_for('home') }}">Back to Login</a></p>
            </div>
        </form>
    </div>
</body>
</html>
